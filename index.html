<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Padarth</title>
        <style>
            body {
                background-color: rgb(50, 49, 49);
            }

            #head1 {
                cursor: default;
                position: relative;
                top : 2%;
                left : 2%;
                font-size: 40px;
                font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                color :rgb(35, 232, 5);
            }

            button {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                background-color: rgb(248, 174, 3);
                border: 5px #faf9f9 solid;
                height: 7%;
                font-size: 20px;
                color: rgb(247, 248, 249);
                border-radius: 10px;
                position: fixed;
                top: 75%;
                font-weight: 530;
                left:43%;
                cursor: pointer;
            } 
            button:hover{
                background-color: rgb(248, 190, 55);
                color: rgb(242, 244, 245);
            }

            #retake{
                top : 30%;
                left : 74%;
                visibility:hidden;
            }

            #uplod{
                top : 40%;
                left : 74%;
                visibility:hidden;
            }

            video, canvas, img { 
                position: fixed;
                top: 15%;
                left:34%;
                width: 100%; 
                height: 100%;
                border-radius: 10px;
                max-height: 300px;
                max-width: 400px; 
            }

            #captured-image{
                position: fixed;
                top: 15%;
                left:34%;
                width: 100%; 
                height: 100%;
                border-radius: 10px;
                max-height: 300px;
                max-width: 400px; 
                border: 10px rgb(228, 222, 222) solid;
            }
            
            #leaf{
                height:100px;
                width:100px;
                top:10px;
                left:40px;
            }

        
        </style>
        <body>
            <img src="https://raw.githubusercontent.com/KetanB6/Portfolio/43507ea313b4970e7c3f8a06a38962a4988e8b19/leaf.png" width="10px" id="leaf">
            <h2 id = "head1">Padarth</h2>

            <video id="webcam" autoplay></video>
            <button id="capture" style="display: none;">Capture Image</button>
            <canvas id="canvas" style="display: none;"></canvas>
            <img id="captured-image" alt="Captured Image" style="display: none;">
            <input type="file" id="upload" style="display: none;">
            <button id="scan">Scan Ingredients</button>
            <button id="retake">Retake</button>
            <button id="uplod">Upload</button>


            <script>
                const uplod = document.getElementById('uplod');
                const scanBtn = document.getElementById('scan');
                const captureBtn = document.getElementById('capture');
                const webcam = document.getElementById('webcam');
                const canvas = document.getElementById('canvas');
                const capturedImage = document.getElementById('captured-image');
                const retake = document.getElementById('retake');
        
                let stream = null;
        
                // Open webcam
                async function startWebcam() {
                    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }  // Use "user" for the front camera
        });
        webcam.srcObject = stream;
        webcam.style.display = 'block';
        captureBtn.style.display = 'inline';
        scanBtn.style.display = 'none';
    } catch (error) {
        console.error("Error accessing webcam:", error);
        alert("Camera access denied or unavailable.");
    }
}

                scanBtn.addEventListener('click', startWebcam);

                // Capture image
                captureBtn.addEventListener('click', () => {
                    const context = canvas.getContext('2d');
                    canvas.width = webcam.videoWidth;
                    canvas.height = webcam.videoHeight;
                    context.drawImage(webcam, 0, 0, canvas.width, canvas.height);
        
                    capturedImage.src = canvas.toDataURL('image/png');
                    capturedImage.style.display = 'block';
                    
                    retake.style.visibility = 'visible';
                    uplod.style.visibility = 'visible';
                    // Stop the webcam stream
                    stream.getTracks().forEach(track => track.stop());
                    captureBtn.style.visibility = "hidden";
                    
                });

                // Retake Image (Restart Camera)
                retake.addEventListener('click', () => {
                    // Clear captured image
                    capturedImage.src = "";
                    capturedImage.style.display = 'none';

                    // Hide retake & upload buttons
                    captureBtn.style.visibility = "visible";

                    // Restart webcam
                    startWebcam();
                });

                uplod.addEventListener('click', () => {
                    // Clear captured image
                    imgUrl = capturedImage.src;
                    alert("Image uploaded");
                });
        
            </script>
        </body>
    </head>
</html>
